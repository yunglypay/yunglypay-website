<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yungly Pay — Limited Access</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.wrap{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:32px;}

/* Logo */
.logo{font-size:28px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.logo span{color:#8B9FFF;}

/* Main card */
.card{background:#fff;border-radius:24px;width:100%;padding:32px 28px;text-align:center;}

.lock-icon{width:64px;height:64px;border-radius:50%;background:#D8DEFF;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;}

.card-title{font-size:22px;font-weight:800;color:#111;margin-bottom:8px;letter-spacing:-0.3px;}
.card-sub{font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:28px;}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.divider-line{flex:1;height:1px;background:#E5E7EB;}
.divider-text{font-size:12px;color:#9CA3AF;font-weight:500;white-space:nowrap;}

/* Login form */
.login-form{display:none;text-align:left;}
.login-form.show{display:block;}

.form-label{font-size:11px;font-weight:600;color:#6B7280;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;background:#F4F5FB;border:1.5px solid transparent;border-radius:12px;padding:12px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:#111;outline:none;transition:border-color 0.15s;margin-bottom:14px;}
.form-input:focus{border-color:#8B9FFF;background:#fff;}
.form-input::placeholder{color:#aaa;}

.btn-login{width:100%;background:#111;color:#fff;border:none;border-radius:12px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.15s;margin-top:4px;}
.btn-login:hover{opacity:0.85;}

.btn-admin{display:inline-flex;align-items:center;gap:6px;background:#D8DEFF;color:#4A5AE8;border:none;border-radius:100px;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;margin:0 auto;}
.btn-admin:hover{background:#8B9FFF;color:#fff;}

.error-msg{background:#FEE2E2;color:#DC2626;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;margin-bottom:14px;display:none;}
.error-msg.show{display:block;}

.back-link{font-size:13px;color:#6B7280;margin-top:4px;cursor:pointer;text-align:center;display:block;}
.back-link:hover{color:#111;}

/* Bottom note */
.note{font-size:12px;color:rgba(255,255,255,0.3);text-align:center;line-height:1.6;}
</style>
</head>
<body>

<div class="wrap">
  <div class="logo">Yungly<span>.</span></div>

  <div class="card">
    <div class="lock-icon">🔒</div>
    <div class="card-title">Limited Access</div>
    <div class="card-sub">This demo is currently restricted to internal team members only. Public access is temporarily disabled.</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">Are you a team member?</div>
      <div class="divider-line"></div>
    </div>

    <!-- Admin login trigger -->
    <div id="adminBtn">
      <button class="btn-admin" onclick="showLogin()">🔑 Admin Login</button>
    </div>

    <!-- Login form (hidden by default) -->
    <div class="login-form" id="loginForm">
      <div class="error-msg" id="errorMsg">Incorrect ID or password. Try again.</div>
      <label class="form-label">Admin ID</label>
      <input class="form-input" id="adminId" type="text" placeholder="Enter admin ID" autocomplete="off"/>
      <label class="form-label">Password</label>
      <input class="form-input" id="adminPass" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="btn-login" onclick="doLogin()">Login →</button>
      <span class="back-link" onclick="hideLogin()">← Back</span>
    </div>
  </div>

  <div class="note">Yungly Pay · Pre-launch · Kerala, India<br>For access requests: info@yunglypay.in</div>
</div>

<script>
  // ── CREDENTIALS — change these to whatever you want ──
  const ADMIN_ID   = 'yungly_admin';
  const ADMIN_PASS = 'YunglyPay@2026';

  function showLogin() {
    document.getElementById('adminBtn').style.display = 'none';
    document.getElementById('loginForm').classList.add('show');
    document.getElementById('adminId').focus();
  }

  function hideLogin() {
    document.getElementById('loginForm').classList.remove('show');
    document.getElementById('adminBtn').style.display = 'block';
    document.getElementById('errorMsg').classList.remove('show');
  }

  function doLogin() {
    const id   = document.getElementById('adminId').value.trim();
    const pass = document.getElementById('adminPass').value;
    if (id === ADMIN_ID && pass === ADMIN_PASS) {
      sessionStorage.setItem('yp_admin', 'granted');
      window.location.replace('demo.html');
    } else {
      document.getElementById('errorMsg').classList.add('show');
      document.getElementById('adminPass').value = '';
      document.getElementById('adminPass').focus();
    }
  }
</script>
</body>
</html>
